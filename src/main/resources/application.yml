spring:
  application:
    name: crm-backend
  mail:
    host: smtppro.zoho.com
    port: 465
    username: taller@emediusgw.com
    password: CvG2Txk4ruRz
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: false
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:admin}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        tenant_identifier_resolver: com.emelius.crmbackend.config.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.emelius.crmbackend.config.tenant.SchemaConnectionProvider
    show-sql: true
    open-in-view: false