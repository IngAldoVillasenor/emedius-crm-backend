spring:
  application:
    name: crm-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/crm_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true